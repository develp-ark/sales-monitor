<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#f5f6fa;color:#333;font-size:14px;line-height:1.6}

.header{background:linear-gradient(135deg,#1a73e8 0%,#4285f4 100%);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(26,115,232,.3)}
.header h1{font-size:18px;color:#fff;font-weight:700;letter-spacing:-0.3px}
.header .sub{font-size:12px;color:rgba(255,255,255,.8)}
.wrap{max-width:1280px;margin:0 auto;padding:16px}

.action{background:#fff;border-radius:12px;padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e8eaed}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-blue{background:#1a73e8;color:#fff;box-shadow:0 1px 3px rgba(26,115,232,.3)}
.btn-blue:hover{background:#1557b0;box-shadow:0 2px 6px rgba(26,115,232,.4);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#1a73e8;border:1.5px solid #dadce0}
.btn-ghost:hover{background:#e8f0fe;border-color:#1a73e8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.hint{font-size:11px;color:#9aa0a6;margin-left:auto}

.log{background:#202124;color:#8ab4f8;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-family:'Fira Code',Consolas,monospace;font-size:11px;max-height:140px;overflow-y:auto;display:none;white-space:pre-wrap;border:1px solid #3c4043}
.log.show{display:block}

.main-tabs{display:flex;gap:0;background:#fff;border-radius:12px 12px 0 0;border-bottom:2px solid #e8eaed;overflow-x:auto}
.main-tab{padding:12px 28px;font-size:14px;font-weight:600;color:#5f6368;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.main-tab:hover{color:#1a73e8;background:#f8f9ff}
.main-tab.active{color:#1a73e8;border-bottom-color:#1a73e8;background:#f8f9ff}
.main-panel{display:none;background:#fff;border-radius:0 0 12px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e8eaed;border-top:none}
.main-panel.active{display:block}

/* ===== Toss-style Brand Cards v2 ===== */
.dash-inner{padding:24px}
.dash-grid{display:flex;flex-direction:column;gap:14px;padding:0 16px 24px}
@media(min-width:768px){
  .dash-grid{flex-direction:row;flex-wrap:wrap}
  .brand-tile{flex:1;min-width:280px;max-width:calc(33.333% - 10px)}
}

.brand-tile{
  background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;
}
.brand-tile:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}

.bt-hero{
  padding:22px 22px 18px;position:relative;overflow:hidden;
}

.bt-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1}
.bt-hero-top h3{font-size:15px;font-weight:700;margin:0;color:#191F28;display:flex;align-items:center;gap:8px}
.brand-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.brand-actions{display:flex;gap:5px}
.brand-actions a{
  display:flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:10px;
  text-decoration:none;font-size:13px;
  transition:background .15s;position:relative;
}
.brand-actions a.act-sheet{background:rgba(49,130,246,.1);color:#3182F6}
.brand-actions a.act-sheet:hover{background:rgba(49,130,246,.2)}
.brand-actions a.act-insight{background:rgba(124,92,252,.1);color:#7C5CFC}
.brand-actions a.act-insight:hover{background:rgba(124,92,252,.2)}

.bt-big{position:relative;z-index:1}
.bt-big-label{font-size:12px;color:#8B95A1;font-weight:500;margin-bottom:4px}
.bt-big-val{font-size:32px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1.1}

.bt-duo{display:flex;gap:0;border-top:1px solid #F2F4F6;position:relative;z-index:1}
.bt-duo-item{flex:1;padding:14px 22px;display:flex;flex-direction:column;gap:2px}
.bt-duo-item+.bt-duo-item{border-left:1px solid #F2F4F6}
.bt-duo-label{font-size:11px;color:#8B95A1;font-weight:500}
.bt-duo-val{font-size:18px;font-weight:700;color:#191F28;font-variant-numeric:tabular-nums}

.bt-badges{display:flex;gap:0;border-top:1px solid #F2F4F6}
.bt-badge{flex:1;padding:12px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.bt-badge+.bt-badge{border-left:1px solid #F2F4F6}
.bt-badge-label{font-size:10px;color:#8B95A1;font-weight:500}
.bt-badge-val{font-size:14px;font-weight:700;color:#333;font-variant-numeric:tabular-nums}
.bt-badge-val.red{color:#F04452}

.stitle{font-size:15px;font-weight:700;color:#202124;margin:24px 0 10px;padding-left:12px;border-left:4px solid #1a73e8}
.trend-wrap{overflow-x:auto;border-radius:10px;border:1px solid #e8eaed}
table.trend{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
table.trend th,table.trend td{padding:7px 10px;text-align:right;border-bottom:1px solid #f1f3f4}
table.trend th{background:#f8f9fa;color:#5f6368;font-weight:600;position:sticky;top:0;z-index:2;white-space:nowrap;font-size:11px}
table.trend th:first-child,table.trend td:first-child{text-align:left}
table.trend td:first-child{font-weight:600;color:#202124}
table.trend tr:hover{background:#f8faff}
table.trend .wk{background:#e8f0fe;font-weight:700}
table.trend .tot{background:#fff8e1;font-weight:700}

.insight-inner{padding:0}
.brand-tabs{display:flex;gap:0;background:#f8f9fa;border-bottom:1px solid #e8eaed;overflow-x:auto;padding:0 8px}
.brand-tab{padding:12px 24px;font-size:13px;font-weight:600;color:#5f6368;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.brand-tab:hover{color:#1a73e8}
.brand-tab.active{color:#1a73e8;border-bottom-color:#1a73e8;background:#fff}
.brand-content{display:none;padding:24px}
.brand-content.active{display:block}

.brand-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.brand-hdr h2{font-size:17px;font-weight:700;color:#202124}

.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.scard{background:linear-gradient(135deg,#f8f9ff 0%,#fff 100%);border-radius:10px;padding:12px;text-align:center;border:1px solid #e8eaed;transition:all .2s}
.scard:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.scard .sl{font-size:11px;color:#5f6368;margin-bottom:4px;font-weight:500}
.scard .sv{font-size:18px;font-weight:700;color:#202124}
.scard .sv.blue{color:#1a73e8}
.scard .sv.red{color:#ea4335}
.scard .sv.green{color:#34a853}

.ctrl-panel{background:#f8f9fa;border:1px solid #e8eaed;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-group label{font-size:11px;color:#5f6368;font-weight:600;white-space:nowrap}
.ctrl-group input[type=range]{width:80px;accent-color:#1a73e8}
.ctrl-val{font-size:12px;font-weight:700;color:#1a73e8;min-width:32px;text-align:center}
.ctrl-sep{width:1px;height:24px;background:#dadce0}

.flag-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.flag-bar span{font-size:12px;color:#5f6368;margin-right:4px}
.flag-chip{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #dadce0;background:#fff;color:#5f6368;transition:all .2s}
.flag-chip:hover{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe}
.flag-chip.active{background:#1a73e8;color:#fff;border-color:#1a73e8;box-shadow:0 1px 4px rgba(26,115,232,.3)}

.i-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.i-grid{grid-template-columns:1fr}}
.i-box{border:1px solid #e8eaed;border-radius:12px;overflow:hidden;background:#fff;transition:box-shadow .2s}
.i-box:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.i-title{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid #f1f3f4;display:flex;align-items:center;gap:6px}
.i-title.t-top{color:#1a73e8;background:linear-gradient(90deg,#f0f6ff,#fff);border-left:4px solid #1a73e8}
.i-title.t-out{color:#ea4335;background:linear-gradient(90deg,#fef7f6,#fff);border-left:4px solid #ea4335}
.i-title.t-up{color:#34a853;background:linear-gradient(90deg,#f2faf4,#fff);border-left:4px solid #34a853}
.i-title.t-down{color:#e67e22;background:linear-gradient(90deg,#fef9f3,#fff);border-left:4px solid #e67e22}

.i-list{list-style:none;max-height:340px;overflow-y:auto}
.i-list li{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid #f8f9fa;font-size:12px;gap:8px;transition:background .1s;cursor:pointer}
.i-list li:last-child{border:none}
.i-list li:hover{background:#f8faff}
.rk{width:24px;height:24px;border-radius:50%;background:#f1f3f4;color:#5f6368;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rk.g1{background:#1a73e8;color:#fff}
.rk.g2{background:#4285f4;color:#fff}
.rk.g3{background:#8ab4f8;color:#fff}
.sn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#202124}
.sv2{font-weight:700;white-space:nowrap;font-size:12px}
.sv2.blue{color:#1a73e8}
.sv2.red{color:#ea4335}
.sv2.green{color:#34a853}
.sv2.orange{color:#e67e22}
.tag{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;white-space:nowrap}
.tag-out{background:#fce8e6;color:#ea4335}
.tag-num{background:#e8f0fe;color:#1a73e8}
.tag-stk{background:#f1f3f4;color:#5f6368}
.tag-since{background:#fff3cd;color:#856404}
.tag-flag{background:#e6f4ea;color:#137333;border:1px solid #ceead6}
.empty{padding:24px;text-align:center;color:#9aa0a6;font-size:13px}

.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:400px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h3{font-size:16px;margin-bottom:14px;color:#202124;font-weight:700}
.modal .sku-info{font-size:12px;color:#5f6368;margin-bottom:16px;word-break:break-all;background:#f8f9fa;padding:8px 12px;border-radius:8px}
.modal label{font-size:12px;font-weight:600;color:#5f6368;display:block;margin-bottom:4px}
.modal select,.modal input{width:100%;padding:10px 12px;border:1px solid #dadce0;border-radius:8px;font-size:13px;margin-bottom:14px;transition:border-color .2s}
.modal select:focus,.modal input:focus{border-color:#1a73e8;outline:none;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.modal .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

@media(max-width:600px){
  .wrap{padding:10px}
  .brand-grid{grid-template-columns:1fr}
  .summary-row{grid-template-columns:repeat(3,1fr)}
  .i-grid{grid-template-columns:1fr}
  .ctrl-panel{gap:10px}
}

/* 커스텀 슬라이더 */
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:#e8eaed;outline:none;transition:background .2s}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.ctrl-panel{background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ctrl-group{display:flex;align-items:center;gap:8px}
.ctrl-group label{font-size:11px;color:#5f6368;font-weight:600;white-space:nowrap}
.ctrl-group select{padding:5px 10px;border:1.5px solid #dadce0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;transition:all .2s}
.ctrl-group select:focus{border-color:#1a73e8;outline:none;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.ctrl-val{font-size:13px;font-weight:700;min-width:36px;text-align:center;padding:2px 8px;border-radius:6px}
.ctrl-sep{width:1px;height:28px;background:#e8eaed}

</style>
</head>
<body>
<div id="loadingOverlay" style="
  display:flex; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(255,255,255,0.85); z-index:9999;
  justify-content:center; align-items:center; flex-direction:column;">
  <div style="width:40px;height:40px;border:4px solid #e0e0e0;border-top:4px solid #0984e3;
    border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <p style="margin-top:16px;color:#555;font-size:14px;">대시보드 로딩 중...</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div class="header">
  <h1>📊 통합 판매 모니터링</h1>
  <span class="sub" id="dateD"></span>
</div>

<div class="wrap">
  <!-- Upload buttons -->
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-blue" onclick="document.getElementById('anyFile').click()">파일 업로드</button>
    <button class="btn" onclick="location.reload()"
      style="background:#fff;color:#6B7684;border:1px solid #E5E8EB;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer">
      ↻ 새로고침
    </button>
    <input type="file" id="anyFile" accept=".csv" multiple style="display:none" onchange="handleFiles(this.files);this.value=''">
    <span id="uploadStatus" style="font-size:12px;color:#8B95A1"></span>
  </div>
  <!-- Drop zone -->
  <div id="dropZone"
    style="border:2px dashed #D1D6DB;border-radius:14px;padding:32px 16px;text-align:center;
    background:#FAFBFC;transition:border-color .2s,background .2s;cursor:pointer;margin-top:12px"
    onclick="document.getElementById('anyFile').click()">
    <div style="font-size:15px;font-weight:600;color:#333;margin-bottom:4px">📁 CSV 파일 업로드</div>
    <div style="font-size:12px;color:#8B95A1">판매 CSV · SKU 관리 CSV 자동 인식</div>
  </div>
  <div class="log" id="logBox"></div>

  <div class="main-tabs">
    <div class="main-tab active" onclick="mainTab('dash')">대시보드</div>
    <div class="main-tab" onclick="mainTab('insight')">브랜드 인사이트</div>
    <div class="main-tab" onclick="mainTab('skuManage')">SKU 관리</div>
  </div>

  <div class="main-panel active" id="pDash">
    <div class="dash-inner">
      <div id="dashContent"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="stitle" style="margin:0">일별 판매량</div>
          <a id="trendSheetLink" href="https://docs.google.com/spreadsheets/d/1XCIdrZuHfwoPEqF6u0bVPn4fX32YCOXCKmGUMFz4dSw/edit" target="_blank" class="btn btn-blue" style="font-size:11px;padding:5px 14px;text-decoration:none">📊 시트로 보기</a>
        </div>
      </div>
      <div class="trend-wrap"><table class="trend" id="tTrend"></table></div>
    </div>
  </div>

  <div class="main-panel" id="pInsight">
    <div class="insight-inner">
      <div class="brand-tabs" id="bTabs"></div>
      <div id="bContents"></div>
    </div>
  </div>

  <div class="main-panel" id="pSkuManage">
    <div style="padding:24px" id="skuManageContent"></div>
  </div>
</div>

<div class="modal-bg" id="flagModal">
  <div class="modal">
    <h3>🏷️ 플래그 설정</h3>
    <div class="sku-info" id="flagSkuInfo"></div>
    <label>플래그</label>
    <select id="flagSelect"><option value="">없음 (제거)</option></select>
    <label>메모</label>
    <input id="flagMemo" placeholder="선택사항">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeFlag()">취소</button>
      <button class="btn btn-blue" onclick="saveFlag()">저장</button>
    </div>
  </div>
</div>

<script>
var D = null;
var FLAG_SKU = { id:'', name:'', brand:'' };
var CTRL = { threshold:30, minSales:5, period:7, topCount:10 };
var FLAG_FILTER = {};

// ★ 전역 브랜드 테마 (한 번만 정의)
var bTheme={
  '건우코리아':{color:'#F04452',light:'#FEECEE',grad:'linear-gradient(135deg,#FEECEE 0%,#fff 60%)'},
  '아리코':    {color:'#3182F6',light:'#EBF3FE',grad:'linear-gradient(135deg,#EBF3FE 0%,#fff 60%)'},
  '윰':       {color:'#00B493',light:'#E8FAF6',grad:'linear-gradient(135deg,#E8FAF6 0%,#fff 60%)'}
};
var defaultTheme={color:'#6B7684',light:'#F2F3F5',grad:'linear-gradient(135deg,#F2F3F5 0%,#fff 60%)'};

var BRAND_ORDER = ['아리코','윰','건우코리아'];
function orderedBrands(obj){
  obj = obj || {};
  var arr = BRAND_ORDER.filter(function(b){ return obj[b]; });
  Object.keys(obj).forEach(function(b){ if(arr.indexOf(b)===-1) arr.push(b); });
  return arr;
}


document.getElementById('dateD').textContent = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
loadAll();

function mainTab(id){
  document.querySelectorAll('.main-tab').forEach(function(t,i){
    t.classList.toggle('active',(id==='dash'&&i===0)||(id==='insight'&&i===1)||(id==='skuManage'&&i===2));
  });
  document.getElementById('pDash').classList.toggle('active',id==='dash');
  document.getElementById('pInsight').classList.toggle('active',id==='insight');
  document.getElementById('pSkuManage').classList.toggle('active',id==='skuManage');
  if(id==='skuManage') renderSkuManage();
}

async function loadAll(){
  setLoading(true);
  try {
    var r = await fetch('/api/dashboard');
    var d = await r.json();
    if(!r.ok) throw new Error(d.error || '대시보드 로드 실패');
    D = d || {};
    renderDash();
    renderTrend();
    renderInsight();
    log('');
  } catch (e) {
    log('❌ 데이터 로드 오류: '+e.message, true);
  } finally {
    setLoading(false);
  }
}

var SHEET_URL = 'https://docs.google.com/spreadsheets/d/1XCIdrZuHfwoPEqF6u0bVPn4fX32YCOXCKmGUMFz4dSw/edit';

function renderDash(){
  if(!D||!D.brands) return;

  var DASH_SHEET_URL='https://docs.google.com/spreadsheets/d/1XCIdrZuHfwoPEqF6u0bVPn4fX32YCOXCKmGUMFz4dSw/edit';
  var h='<div class="dash-grid">';
  var brandNames=orderedBrands(D.brands);

  for(var i=0;i<brandNames.length;i++){
    var b=brandNames[i];
    var info=D.brands[b];
    var t=bTheme[b]||defaultTheme;
    var gid=(D.sheetGids&&D.sheetGids[b])||'0';
    var sheetHref=DASH_SHEET_URL+'#gid='+gid;

    var todaySales=parseInt(info.todaySales)||0;
    var s7=parseInt(info.sum7)||0;
    var avg7=s7>0?(s7/7).toFixed(1):'0';
    var skuCount=parseInt(info.skuCount)||0;
    var stockSum=parseInt(info.stockSum)||0;
    var oosCount=parseInt(info.outOfStockCount)||0;

    h+='<div class="brand-tile">';

    h+='<div class="bt-hero" style="background:'+t.grad+';color:'+t.color+'">';
    h+='<div class="bt-hero-top">';

function renderTrend(){
  if(!D||!D.dates||!D.dates.length) return;
  var brands = orderedBrands(D.brands||{});
  var dt = D.dailyTrend || {};
  var dn = ['일','월','화','수','목','금','토'];
  var tTheme = brands.map(function(b){
    var t = bTheme[b] || defaultTheme;
    return {bg:t.light, hd:t.color, tx:t.color, sub:t.light, accent:t.color};
  });
  function bt(i){ return tTheme[i] || {bg:'#f5f5f5',hd:'#888',tx:'#888',sub:'#eee',accent:'#888'}; }



  function fmtD(d){return d.toISOString().slice(0,10);}
  function addD(iso,n){var x=new Date(iso+'T12:00:00Z');x.setUTCDate(x.getUTCDate()+n);return fmtD(x);}
  function dayOfWeek(iso){return new Date(iso+'T12:00:00Z').getUTCDay();}
  function val(b,d){return (dt[b]&&dt[b][d])?Number(dt[b][d]):0;}
  function bt(i){return tTheme[i] || {bg:'#f5f5f5',hd:'#888',tx:'#888',sub:'#eee',accent:'#888'};}
  function fmtDate(d){var p=d.split('-');if(p.length===3)return p[0].substring(2)+'.'+p[1]+'.'+p[2];return d;}
  function fmtRange(d1,d2){return fmtDate(d2)+' ~ '+fmtDate(d1);}

  var today = D.latestDate || D.dates[D.dates.length-1];
  var currentMonth1st = (D.latestDate || today).slice(0, 8) + '01';
  var cutoff = currentMonth1st;
  var todayDow = dayOfWeek(today);
  var thisWeekSun = addD(today, -todayDow);
  var prev1Sun = addD(thisWeekSun, -7);
  var prev2Sun = addD(thisWeekSun, -14);
  var prev3Sun = addD(thisWeekSun, -21);

  function weekDays(startSun, endDate){
    var arr=[], cur=startSun;
    for(var i=0;i<7;i++){
      if(cur>endDate) break;
      arr.push(cur);
      cur=addD(cur,1);
    }
    return arr;
  }

  var thisWeekDays = weekDays(thisWeekSun, today);
  var prev1Days = weekDays(prev1Sun, addD(thisWeekSun,-1));
  var prev2Days = weekDays(prev2Sun, addD(prev1Sun,-1));
  var prev3Days = weekDays(prev3Sun, addD(prev2Sun,-1));

  var colgroup = '<colgroup>'
    + '<col style="width:140px">'
    + '<col style="width:50px">';
  for(var ci=0; ci<brands.length; ci++){
    colgroup += '<col>';
  }
  colgroup += '<col>';
  colgroup += '</colgroup>';

  var hd='<thead><tr>';
  hd+='<th style="background:#f8f9fa;text-align:center;min-width:64px;border-right:1px solid #e8eaed">날짜</th>';
  hd+='<th style="background:#f8f9fa;text-align:center;min-width:32px;border-right:1px solid #e8eaed">요일</th>';
  brands.forEach(function(b,i){
    var t=bt(i);
    hd+='<th style="background:'+t.hd+';color:#fff;text-align:center;font-size:13px;font-weight:700;padding:10px 16px;border-left:1px solid rgba(255,255,255,.3)">'+esc(b)+'</th>';
  });
  hd+='<th style="background:#202124;color:#fff;text-align:center;font-size:13px;font-weight:700;padding:10px 16px;border-left:1px solid #444">합계</th>';
  hd+='</tr></thead>';

  var bd='<tbody>';

  function renderWeekBlock(days, label){
    var sums={}, total=0, count=days.length;
    brands.forEach(function(b){sums[b]=0;});

    for(var i=days.length-1;i>=0;i--){
      var d=days[i], dw=dn[dayOfWeek(d)], rt=0;
      var isWeekend = dayOfWeek(d)===0||dayOfWeek(d)===6;
      bd+='<tr>';
      bd+='<td style="text-align:center;font-weight:600;color:#202124;border-right:1px solid #f1f3f4;padding:8px 10px">'+fmtDate(d)+'</td>';
      bd+='<td style="text-align:center;border-right:1px solid #f1f3f4;color:'+(dayOfWeek(d)===0?'#ea4335':dayOfWeek(d)===6?'#1a73e8':'#5f6368')+';font-weight:'+(isWeekend?'600':'400')+'">'+dw+'</td>';
      brands.forEach(function(b,bi){
        var v=val(b,d), t=bt(bi);
        if(v===0){
          bd+='<td style="text-align:center;color:#d0d0d0;border-left:1px solid #f1f3f4;padding:8px 10px">-</td>';
        }else{
          bd+='<td style="text-align:center;font-weight:600;color:'+t.tx+';border-left:1px solid #f1f3f4;padding:8px 10px">'+num(v)+'</td>';
        }
        rt+=v; sums[b]+=v;
      });
      var totColor = rt===0?'#d0d0d0':'#202124';
      bd+='<td style="text-align:center;font-weight:700;color:'+totColor+';border-left:1px solid #e8eaed;background:#fafafa;padding:8px 10px">'+(rt===0?'-':num(rt))+'</td></tr>';
      total+=rt;
    }

    bd+='<tr style="border-top:2px solid #1a73e8;border-bottom:2px solid #1a73e8">';
    bd+='<td colspan="2" style="text-align:left;font-weight:700;color:#1a73e8;padding:10px 12px;background:#e8f0fe;border-right:1px solid #c5d8f0">'+label+' ('+count+'일)</td>';
    brands.forEach(function(b,bi){
      var t=bt(bi);
      var avg = count>0 ? Math.round(sums[b]/count) : 0;
      bd+='<td style="text-align:center;padding:6px 8px;background:'+t.bg+';border-left:1px solid '+t.sub+'">'
        +'<div style="font-weight:700;font-size:14px;color:'+t.accent+'">'+num(sums[b])+'</div>'
        +'<div style="font-size:10px;color:'+t.tx+';font-weight:500;margin-top:2px">일평균 '+num(avg)+'</div>'
        +'</td>';
    });
    var avgTotal = count>0 ? Math.round(total/count) : 0;
    bd+='<td style="text-align:center;padding:6px 8px;background:#f0f0f0;border-left:1px solid #ddd">'
      +'<div style="font-weight:700;font-size:14px;color:#202124">'+num(total)+'</div>'
      +'<div style="font-size:10px;color:#5f6368;font-weight:500;margin-top:2px">일평균 '+num(avgTotal)+'</div>'
      +'</td></tr>';
  }




  var olderDates = (D.dates||[]).filter(function(d){return d<cutoff;});
  if(olderDates.length>0){
    var colSpan = 2 + brands.length + 1;
    bd+='<tr><td colspan="'+colSpan+'" style="background:#f8f9fa;text-align:center;font-weight:700;font-size:12px;color:#5f6368;padding:10px;border-top:2px solid #e8eaed">이전 주간 요약</td></tr>';

    var weeks=[], curWeek=null;
    for(var oi=olderDates.length-1;oi>=0;oi--){
      var od=olderDates[oi], odow=dayOfWeek(od);
      if(!curWeek||odow===6){
        if(curWeek) weeks.push(curWeek);
        curWeek={start:od,end:od,days:0,brands:{},total:0};
        brands.forEach(function(b){curWeek.brands[b]=0;});
      }
      curWeek.start=od; curWeek.days++;
      brands.forEach(function(b){
        var vv=val(b,od); curWeek.brands[b]+=vv; curWeek.total+=vv;
      });
    }
    if(curWeek&&curWeek.days>0) weeks.push(curWeek);

    bd+='<tr>';
    bd+='<th style="background:#f1f3f4;text-align:center;border-right:1px solid #e8eaed">기간</th>';
    bd+='<th style="background:#f1f3f4;text-align:center;border-right:1px solid #e8eaed">일수</th>';
    brands.forEach(function(b,i){
      var t=bt(i);
      bd+='<th style="background:'+t.sub+';text-align:center;border-left:1px solid #e8eaed;color:'+t.tx+';font-weight:700">'+esc(b)+'</th>';
    });
    bd+='<th style="background:#e8eaed;text-align:center;border-left:1px solid #ddd">합계</th></tr>';

    for(var w=0;w<weeks.length;w++){
      var wk=weeks[w], wkAvg=wk.days>0?Math.round(wk.total/wk.days):0;
      bd+='<tr>';
      bd+='<td style="text-align:center;font-weight:600;border-right:1px solid #f1f3f4;padding:8px">'+fmtRange(wk.start,wk.end)+'</td>';
      bd+='<td style="text-align:center;color:#5f6368;border-right:1px solid #f1f3f4">'+wk.days+'일</td>';
      brands.forEach(function(b,bi){
        var t=bt(bi);
        var bAvg = wk.days>0?Math.round(wk.brands[b]/wk.days):0;
        bd+='<td style="text-align:center;padding:6px 8px;border-left:1px solid #f1f3f4">'
          +'<div style="font-weight:600;color:'+t.tx+'">'+num(wk.brands[b])+'</div>'
          +'<div style="font-size:10px;color:#9aa0a6;margin-top:1px">일 '+num(bAvg)+'</div>'
          +'</td>';
      });
      bd+='<td style="text-align:center;padding:6px 8px;border-left:1px solid #e8eaed">'
        +'<div style="font-weight:700">'+num(wk.total)+'</div>'
        +'<div style="font-size:10px;color:#1a73e8;font-weight:600;margin-top:1px">일 '+num(wkAvg)+'</div>'
        +'</td></tr>';
    }
  }

  bd+='</tbody>';
  document.getElementById('tTrend').innerHTML = colgroup+hd+bd;
}

function recompute(brand){
  var bi=((D.brandInsights||{})[brand]||{})[String(CTRL.period)]||{topSales:[],oos:[],surgeUp:[],surgeDown:[]};
  var topSales=(bi.topSales||[]).slice().sort(function(a,b){return (b.sales||0)-(a.sales||0)}).slice(0,CTRL.topCount);
  var outOfStock=(bi.oos||[]).slice();
  var rising=filterSurge(bi.surgeUp||[], true);
  var falling=filterSurge(bi.surgeDown||[], false);
  var grid=document.getElementById('igrid_'+brand);
  if(!grid) return;
  grid.innerHTML=
    mkBox('🏆 판매 TOP '+CTRL.topCount+' ('+CTRL.period+'일)','t-top',topSales,'top',brand)+
    mkBox('🚫 품절 ('+outOfStock.length+'건)','t-out',outOfStock,'out',brand)+
    mkBox('📈 급상승 (≥+'+CTRL.threshold+'%, ≥'+CTRL.minSales+'개)','t-up',rising,'up',brand)+
    mkBox('📉 급하락 (≤-'+CTRL.threshold+'%, 이전≥'+CTRL.minSales+'개)','t-down',falling,'down',brand);
  applyFlagFilter(brand);
  updateSummaryPeriod(brand);
}

function filterSurge(arr, isUp){
  var out=[];
  for(var i=0;i<arr.length;i++){
    var x=arr[i], prev=Number(x.prev||0), cur=Number(x.cur||0), delta=Number(x.delta||0);
    var rate = prev>0 ? (delta/prev)*100 : (cur>0?999:0);
    if(isUp){
      if(rate>=CTRL.threshold && cur>=CTRL.minSales) out.push({id:x.sku_id,name:x.sku_name,cur:cur,prev:prev,delta:delta,rate:rate});
    }else{
      if(rate<=(-CTRL.threshold) && prev>=CTRL.minSales) out.push({id:x.sku_id,name:x.sku_name,cur:cur,prev:prev,delta:delta,rate:rate});
    }
  }
  out.sort(function(a,b){ return isUp ? b.rate-a.rate : a.rate-b.rate; });
  return out.slice(0,10);
}

function mkBox(title,cls,arr,type,brand){
  var h='<div class="i-box"><div class="i-title '+cls+'">'+title+'</div>';
  if(!arr||!arr.length) return h+'<div class="empty">해당 항목 없음</div></div>';
  h+='<ul class="i-list">';
  for(var i=0;i<arr.length;i++){
    var s=arr[i], rc=i===0?'g1':i===1?'g2':i===2?'g3':'';
    var meta=(D.flags||{})[String(s.id||s.sku_id)]||{};
    var flag=meta.flag||'', flagTag=flag?'<span class="tag tag-flag">'+esc(flag)+'</span>':'';
    var sid=String(s.id||s.sku_id||'');
    var snm=String(s.name||s.sku_name||sid);
    var _sm=(D.skuManageMap&&D.skuManageMap[sid]);
    var _su=_sm?getSkuUrl(_sm):((D.skuUrls&&D.skuUrls[sid])||'');
    var snmHtml=_su
      ?'<a href="'+esc(_su)+'" target="_blank" onclick="event.stopPropagation()" style="color:inherit;text-decoration:underline;text-underline-offset:2px">'+esc(snm)+'</a>'
      :esc(snm);
    h+='<li data-flag="'+esc(flag)+'" onclick="openFlag(\''+esc(sid)+'\',\''+esc(snm)+'\',\''+esc(brand)+'\')">'
      +'<span class="rk '+rc+'">'+(i+1)+'</span>'
      +'<span class="sn" title="'+esc(sid)+'">'+snmHtml+'</span>'+flagTag;
    if(type==='top'){
      h+='<span class="sv2 blue">'+num(Number(s.sales||0))+'개</span>';
    }else if(type==='out'){
      h+='<span class="tag tag-stk">재고 '+num(s.stock==null?0:s.stock)+'</span>';
      h+='<span class="tag tag-out">'+esc(s.status||'품절')+'</span>';
    }else if(type==='up'){
      h+='<span class="tag tag-num">'+num(s.cur)+'개</span>'
        +'<span class="sv2 green">↑'+Math.round(s.rate)+'%</span>'
        +'<span class="tag tag-stk">이전 '+num(s.prev)+'</span>';
    }else if(type==='down'){
      h+='<span class="tag tag-num">'+num(s.cur)+'개</span>'
        +'<span class="sv2 orange">↓'+Math.abs(Math.round(s.rate))+'%</span>'
        +'<span class="tag tag-stk">이전 '+num(s.prev)+'</span>';
    }
    h+='</li>';
  }
  h+='</ul></div>';
  return h;
}

function ctrlChange(brand,key,val){
  CTRL[key]=Number(val);
  Object.keys(D.brands||{}).forEach(function(b){
    if(key==='period'){
      var sel=document.getElementById('sel_period_'+b); if(sel) sel.value=String(CTRL.period);
    }
    var el=document.getElementById('cv_'+key+'_'+b);
    if(el){
      if(key==='threshold') el.textContent='±'+CTRL[key]+'%';
      else if(key==='topCount') el.textContent=CTRL[key]+'개';
      else if(key==='minSales') el.textContent=CTRL[key]+'개';
    }
    recompute(b);
  });
}

function buildFlagChips(brand){
  var values=['전체'], seen={};
  Object.keys(D.flags||{}).forEach(function(k){
    var f=(D.flags[k]&&D.flags[k].flag)||'';
    if(f && !seen[f]){seen[f]=1;values.push(f);}
  });
  var h='<span>플래그:</span>';
  values.forEach(function(v){
    h+='<div class="flag-chip'+(FLAG_FILTER[brand]===v?' active':'')+'" onclick="filterFlag(\''+esc(brand)+'\',\''+esc(v)+'\',this)">'+esc(v)+'</div>';
  });
  return h;
}

function filterFlag(brand,flag,el){

function detectCsvType(text){
  var firstLine=text.split('\n')[0].toLowerCase();
  if(firstLine.indexOf('pid')!==-1 || firstLine.indexOf('iid')!==-1 || firstLine.indexOf('vid')!==-1
    || firstLine.indexOf('플래그')!==-1 || firstLine.indexOf('flag')!==-1){
    return 'sku-manage';
  }
  return 'sales';
}

function splitCsv(text, maxRows){
  var lines = text.split('\n');
  var header = lines[0];
  var chunks = [];
  var current = [header];
  for(var i=1; i<lines.length; i++){
    if(!lines[i].trim()) continue;
    current.push(lines[i]);
    if(current.length - 1 >= maxRows){
      chunks.push(current.join('\n'));
      current = [header];
    }
  }
  if(current.length > 1) chunks.push(current.join('\n'));
  return chunks;
}

async function handleFiles(files){
  var st=document.getElementById('uploadStatus');
  var total=files.length;
  var salesFiles=[];
  var skuFiles=[];

  for(var i=0;i<total;i++){
    var text=await readFileText(files[i]);
    if(detectCsvType(text)==='sku-manage'){
      skuFiles.push({name:files[i].name, text:text});
    }else{
      salesFiles.push({name:files[i].name, text:text});
    }
  }

  var totalRows=0;
  var totalImported=0;
  var step=0;

  for(var i=0;i<salesFiles.length;i++){
    var f=salesFiles[i];
    var isLastSalesFile=(i===salesFiles.length-1);
    var lineCount=f.text.split('\n').filter(function(l){return l.trim()}).length - 1;

    if(lineCount > 800){
      var chunks=splitCsv(f.text, 800);
      for(var c=0;c<chunks.length;c++){
        var isLast=(c===chunks.length-1)&&isLastSalesFile;
        step++;
        if(st) st.textContent=f.name+' ('+Math.round((c+1)/chunks.length*100)+'%) 업로드 중...';
        try{
          var blob=new Blob([chunks[c]],{type:'text/csv'});
          var fd=new FormData();
          fd.append('file',blob,f.name);
          var url=isLast?'/api/upload':'/api/upload?skipSync=1';
          var r=await fetch(url,{method:'POST',body:fd});
          var d=await r.json();
          totalRows+=(d.rows||0);
        }catch(e){
          if(st) st.textContent='오류: '+f.name+' 청크'+(c+1)+' - '+e.message;
          return;
        }
      }
    }else{
      step++;
      if(st) st.textContent='업로드 중... '+f.name;
      try{
        var blob=new Blob([f.text],{type:'text/csv'});
        var fd=new FormData();
        fd.append('file',blob,f.name);
        var url=isLastSalesFile?'/api/upload':'/api/upload?skipSync=1';
        var r=await fetch(url,{method:'POST',body:fd});
        var d=await r.json();
        totalRows+=(d.rows||0);
      }catch(e){
        if(st) st.textContent='오류: '+f.name+' - '+e.message;
        return;
      }
    }
  }

  for(var i=0;i<skuFiles.length;i++){
    var f=skuFiles[i];
    step++;
    if(st) st.textContent='SKU 등록 중... '+f.name;
    try{
      var blob=new Blob([f.text],{type:'text/csv'});
      var fd=new FormData();
      fd.append('file',blob,f.name);
      var r=await fetch('/api/upload-sku-manage',{method:'POST',body:fd});
      var d=await r.json();
      totalImported+=(d.imported||0);
    }catch(e){
      if(st) st.textContent='오류: '+f.name+' - '+e.message;
      return;
    }
  }

  var msg='완료: ';
  if(totalRows) msg+=totalRows.toLocaleString('ko-KR')+'행 판매데이터';
  if(totalRows&&totalImported) msg+=', ';
  if(totalImported) msg+=totalImported.toLocaleString('ko-KR')+'개 SKU 등록';
  if(st) st.textContent=msg;
  setTimeout(function(){location.reload();},2000);
}

function readFileText(file){
  return new Promise(function(resolve){
    var reader=new FileReader();
    reader.onload=function(e){resolve(e.target.result)};
    reader.readAsText(file);
  });
}

      var dUrl = ds.product_url || ('https://www.coupang.com/vp/products/'+ds.sku_id);
      var detectedDate = ds.price_checked_at ? ds.price_checked_at.slice(0,10) : (ds.last_collected ? ds.last_collected.slice(0,10) : '-');
      h += '<tr style="border-top:1px solid #FECDD2;background:'+(i%2===0?'#FFF5F5':'#FFEBEE')+'">';
      h += '<td style="padding:8px 12px"><span style="color:'+dbc.color+';font-weight:600">'+esc(ds.brand)+'</span></td>';
      h += '<td style="padding:8px 12px;text-align:center;font-family:monospace">'+esc(ds.sku_id)+'</td>';
      h += '<td style="padding:8px 12px">'+esc(ds.sku_name||'')+'</td>';
      h += '<td style="padding:8px 12px;text-align:center">';
      if(ds.flag){
        h += '<span style="background:'+dfs.bg+';color:'+dfs.color+';padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">'+esc(ds.flag)+'</span>';
      } else {
        h += '-';
      }
      h += '</td>';
      h += '<td style="padding:8px 12px;text-align:center;color:#666">'+detectedDate+'</td>';
      h += '<td style="padding:8px 12px;text-align:center"><a href="'+dUrl+'" target="_blank" style="color:#F04452;font-weight:600;text-decoration:none;border:1px solid #F04452;border-radius:4px;padding:3px 10px;font-size:11px">쿠팡 확인</a></td>';
      h += '</tr>';
    }
    h += '</tbody></table>';
    h += '</div>';
  }

  // ── 다음 수집 예정 (날짜/브랜드/플래그 그룹) ──
  h += '<div style="background:#fff;border:1px solid #E5E8EB;border-radius:12px;padding:16px;margin-bottom:20px">';
  h += '<div style="font-size:14px;font-weight:700;margin-bottom:12px">수집 예정 스케줄</div>';

  var scheduleGroups = [];
  for(var d=0; d<7; d++){
    var targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + d);
    var targetStr = targetDate.toISOString().slice(0,10);
    var dayNames = ['일','월','화','수','목','금','토'];
    var dayLabel = (d===0?'오늘':d===1?'내일':targetStr.slice(5)) + ' (' + dayNames[targetDate.getDay()] + ')';

    var dueItems = smItems.filter(function(r){
      if(!r.collect_cycle || r.collect_cycle <= 0) return false;
      if(!r.last_collected){
        return d === 0;
      }
      var lastDate = new Date(r.last_collected.slice(0,10));
      var nextDate = new Date(lastDate);
      nextDate.setDate(nextDate.getDate() + r.collect_cycle);
      return nextDate.toISOString().slice(0,10) === targetStr;
    });

    if(dueItems.length === 0) continue;

    var groupMap = {};
    for(var i=0; i<dueItems.length; i++){
      var r = dueItems[i];
      var key = (r.brand||'미지정') + '||' + (r.flag||'미지정');
      if(!groupMap[key]) groupMap[key] = {brand:r.brand||'미지정', flag:r.flag||'미지정', items:[]};
      groupMap[key].items.push(r);
    }
    var groups = Object.values(groupMap);
    for(var g=0; g<groups.length; g++){
      scheduleGroups.push({
        date: targetStr,
        dateLabel: dayLabel,
        brand: groups[g].brand,
        flag: groups[g].flag,
        items: groups[g].items
      });
    }
  }

  window._scheduleGroups = scheduleGroups;
  if(scheduleGroups.length === 0){
    h += '<div style="color:#8B95A1;font-size:13px;padding:12px 0">향후 7일간 수집 예정 없음 ✅</div>';
  } else {
    h += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
    h += '<thead><tr style="background:#F8F9FA">';
    h += '<th style="padding:10px 12px;text-align:left;font-weight:600">예정일</th>';
    h += '<th style="padding:10px 12px;text-align:left;font-weight:600">브랜드</th>';
    h += '<th style="padding:10px 12px;text-align:center;font-weight:600">플래그</th>';
    h += '<th style="padding:10px 12px;text-align:center;font-weight:600">SKU 수</th>';
    h += '<th style="padding:10px 12px;text-align:center;font-weight:600">상세</th>';
    h += '<th style="padding:10px 12px;text-align:center;font-weight:600">스킵</th>';
    h += '</tr></thead><tbody>';

    for(var i=0; i<scheduleGroups.length; i++){
      var sg = scheduleGroups[i];
      var bc = brandColor[sg.brand]||defBC;
      var fs = flagStyle[sg.flag]||{bg:'#F2F3F5',color:'#6B7684'};
      var isToday = sg.date === today;

      h += '<tr style="border-top:1px solid #F2F4F6;'+(isToday?'background:#FFFDE7;':'')+'" id="schedRow_'+i+'">';

      h += '<td style="padding:10px 12px;font-weight:'+(isToday?'700':'400')+';color:'+(isToday?'#E65100':'#191F28')+'">';
      h += sg.dateLabel;
      h += '</td>';

      h += '<td style="padding:10px 12px"><span style="color:'+bc.color+';font-weight:600">'+esc(sg.brand)+'</span></td>';

      h += '<td style="padding:10px 12px;text-align:center">';
      if(sg.flag !== '미지정'){
        h += '<span style="background:'+fs.bg+';color:'+fs.color+';padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600">'+esc(sg.flag)+'</span>';
      } else {
        h += '<span style="color:#8B95A1;font-size:12px">미지정</span>';
      }
      h += '</td>';

      h += '<td style="padding:10px 12px;text-align:center;font-weight:600">'+sg.items.length+'개</td>';

      h += '<td style="padding:10px 12px;text-align:center">';
      h += '<button onclick="toggleScheduleDetail('+i+')" style="background:none;border:1px solid #E5E8EB;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#3182F6">보기</button>';
      h += '</td>';

      h += '<td style="padding:10px 12px;text-align:center">';
      h += '<button onclick="skipScheduleGroup('+i+')" id="schedSkip_'+i+'" style="background:#F2F3F5;border:1px solid #E5E8EB;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;color:#6B7684">스킵</button>';
      h += '</td>';

      h += '</tr>';

      h += '<tr id="schedDetail_'+i+'" style="display:none"><td colspan="6" style="padding:0 12px 12px 24px;background:#FAFBFC">';
      h += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:4px">';
      h += '<thead><tr><th style="padding:6px 8px;text-align:left;color:#8B95A1;font-weight:500">SKU ID</th><th style="padding:6px 8px;text-align:left;color:#8B95A1;font-weight:500">상품명</th><th style="padding:6px 8px;text-align:right;color:#8B95A1;font-weight:500">현재가</th><th style="padding:6px 8px;text-align:center;color:#8B95A1;font-weight:500">마지막수집</th></tr></thead><tbody>';
      for(var j=0; j<sg.items.length; j++){
        var sr = sg.items[j];
        h += '<tr style="border-top:1px solid #F2F4F6">';
        h += '<td style="padding:6px 8px">'+esc(sr.sku_id)+'</td>';
        h += '<td style="padding:6px 8px">'+esc(sr.sku_name||'')+'</td>';
        h += '<td style="padding:6px 8px;text-align:right">'+(sr.current_price?Number(sr.current_price).toLocaleString('ko-KR')+'원':'-')+'</td>';
        h += '<td style="padding:6px 8px;text-align:center;color:#8B95A1">'+(sr.last_collected?sr.last_collected.slice(0,10).slice(5):'미수집')+'</td>';
        h += '</tr>';
      }
      h += '</tbody></table></td></tr>';
    }
    h += '</tbody></table>';
  }
  h += '</div>';

  document.getElementById('smContent').innerHTML = h;
}

async function skipCollect(skuId){
  if(!confirm('이 SKU의 오늘 수집을 스킵하시겠습니까?')) return;
  var today = new Date().toISOString().slice(0,10);
  try{
    await fetch('/api/sku-manage',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sku_id:skuId, last_collected:today})
    });
    var row = document.getElementById('skipRow_'+skuId);
    if(row){
      row.style.opacity='0.3';
      row.querySelector('button').textContent='스킵됨';
      row.querySelector('button').disabled=true;
    }
  }catch(e){ alert('오류: '+e.message); }
}

function toggleScheduleDetail(idx){
  var el = document.getElementById('schedDetail_'+idx);
  if(!el) return;
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

function skipScheduleGroup(idx){
  var sg = window._scheduleGroups && window._scheduleGroups[idx];
  if(!sg){ alert('스케줄 데이터를 찾을 수 없습니다. 새로고침 후 다시 시도해주세요.'); return; }
  if(!confirm(sg.dateLabel+' / '+sg.brand+' / '+sg.flag+' ('+sg.items.length+'개) 수집을 스킵하시겠습니까?')) return;

  var today = new Date().toISOString().slice(0,10);
  var promises = sg.items.map(function(r){
    return fetch('/api/sku-manage',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sku_id:r.sku_id, last_collected:today})
    });
  });

  Promise.all(promises).then(function(){
    var btn = document.getElementById('schedSkip_'+idx);
    if(btn){ btn.textContent='스킵됨'; btn.disabled=true; btn.style.color='#00B493'; }
    var row = document.getElementById('schedRow_'+idx);
    if(row) row.style.opacity='0.4';
    var detail = document.getElementById('schedDetail_'+idx);
    if(detail) detail.style.opacity='0.4';
  });
}

  h += '<th style="padding:10px 12px;text-align:center;font-weight:600">플래그</th>';

function smSelectBrand(el, brand){
  smActiveBrand = brand;
  smActiveFlag = '';
  document.querySelectorAll('.sm-brand-tab').forEach(function(btn){
    var bc = brandColor[btn.dataset.brand]||{color:'#191F28'};
    if(btn.dataset.brand === brand){
      btn.classList.add('active');
      btn.style.color = btn.dataset.brand ? bc.color : '#191F28';
      btn.style.borderBottomColor = btn.dataset.brand ? bc.color : '#191F28';
      btn.style.fontWeight = '700';
    } else {
      btn.classList.remove('active');
      btn.style.color = '#8B95A1';
      btn.style.borderBottomColor = 'transparent';
      btn.style.fontWeight = '600';
    }
  });

  if(!brand){
    renderSmOverview();
  } else {
    renderSmBrandView(brand);
  }
}

function smSelectFlag(el, flag){
  smActiveFlag = flag;
  var bc = brandColor[smActiveBrand]||{color:'#191F28'};
  document.querySelectorAll('.sm-flag-chip').forEach(function(btn){
    if(btn.dataset.flag === flag){
      btn.classList.add('active');
      btn.style.background = bc.color;
      btn.style.color = '#fff';
      btn.style.borderColor = bc.color;
    } else {
      btn.classList.remove('active');
      btn.style.background = '#fff';
      btn.style.color = '#6B7684';
      btn.style.borderColor = '#E5E8EB';
    }
  });
  filterSkuBrand();
}

function filterSkuBrand(){
  var flag = smActiveFlag;
  var search = (document.getElementById('smSearch')?document.getElementById('smSearch').value:'').toLowerCase();
  var rows = document.querySelectorAll('.sm-row');
  var cnt = 0;
  rows.forEach(function(tr){
    var show = true;
    if(flag==='__none__'){ if(tr.dataset.flag) show=false; }
    else if(flag && tr.dataset.flag!==flag) show=false;
    if(search && tr.dataset.search.toLowerCase().indexOf(search)===-1) show=false;
    tr.style.display = show?'':'none';
    if(show) cnt++;
  });
  document.getElementById('smCount').textContent = cnt+'개';
}

function filterSkuManage(){ filterSkuBrand(); }

function editSku(skuId){
  var r = (D.skuManageMap||{})[skuId];
  if(!r) return;
  var flag = prompt('플래그 (신규/주목/주의/TOP/중요/빈칸):', r.flag||'');
  if(flag===null) return;
  var cycleDefault = {'신규':1,'주목':2,'주의':2,'TOP':3,'중요':3};
  var curCycle = r.collect_cycle || cycleDefault[flag] || 7;
  var cycle = prompt('수집 주기 (일 단위, 1=매일, 0=수집안함):', curCycle);
  if(cycle===null) return;
  cycle = parseInt(cycle)||0;
  var memo = prompt('메모:', r.memo||'');
  if(memo===null) return;
  fetch('/api/sku-manage',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sku_id:skuId, brand:r.brand, sku_name:r.sku_name,
      pid:r.pid, iid:r.iid, vid:r.vid, product_url:r.product_url,
      flag:flag, memo:memo, collect_cycle:cycle, active:1})
  }).then(function(){ renderSkuManage(); });
}

function deactivateSku(skuId){
  if(!confirm('이 SKU를 관리 대상에서 제외하시겠습니까?')) return;
  fetch('/api/sku-manage',{
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sku_id:skuId})
  }).then(function(){location.reload();});
}

async function editPrice(skuId, currentVal){
  var input = prompt('현재 판매가를 입력하세요 (숫자만):', currentVal||'');
  if(input===null) return;
  var price = parseInt(input.replace(/[^0-9]/g,''));
  if(!price && price!==0){ alert('숫자를 입력해주세요'); return; }

  try{
    var r = await fetch('/api/sku-manage',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sku_id:skuId, current_price:price, price_checked_at:new Date().toISOString()})
    });
    var d = await r.json();
    if(d.ok) renderSkuManage();
    else alert('저장 실패: '+(d.error||''));
  }catch(e){ alert('오류: '+e.message); }
}

function timeAgo(dateStr){
  var diff = Date.now() - new Date(dateStr).getTime();
  var min = Math.floor(diff/60000);
  if(min<60) return min+'분 전';
  var hr=Math.floor(min/60);
  if(hr<24) return hr+'시간 전';
  var day=Math.floor(hr/24);
  return day+'일 전';
}

function log(msg, show){
  var lg=document.getElementById('logBox');
  if(!msg){lg.textContent='';lg.classList.remove('show');return;}
  lg.classList.add('show');
  lg.textContent+=(msg+'\n');
  lg.scrollTop=lg.scrollHeight;
}

function setLoading(on){
  document.getElementById('loadingOverlay').style.display=on?'flex':'none';
}

function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function num(n){if(n==null||n==='')return'-';return Number(n).toLocaleString('ko-KR');}
</script>
